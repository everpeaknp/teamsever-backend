version: '3.8'

services:
  backend:
    image: ghcr.io/everpeaknp/teamsever-backend:latest
    container_name: teamsever-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    networks:
      - teamsever-network
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: teamsever-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - teamsever-network

networks:
  teamsever-network:
    driver: bridge

volumes:
  redis_data:
