version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/teamsever-backend:latest
    container_name: teamsever-backend
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    networks:
      - teamsever-network

networks:
  teamsever-network:
    driver: bridge
